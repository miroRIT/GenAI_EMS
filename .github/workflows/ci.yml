name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: emergencypulse
          POSTGRES_USER: emergencypulse
          POSTGRES_PASSWORD: emergencypulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U emergencypulse -d emergencypulse"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://emergencypulse:emergencypulse@localhost:5432/emergencypulse
      JWT_SECRET: ci-only-secret-value-change-in-real-envs

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: make install
      - run: make lint
      - run: python -m alembic upgrade head
      - run: python -m pytest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: emergencypulse-api:${{ github.sha }}

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/envs/dev
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.8.5"
          terraform_wrapper: false
      - name: Check Terraform formatting
        working-directory: .
        run: terraform fmt -check -diff -recursive infra
      - name: Initialize Terraform
        run: terraform init -backend=false
      - name: Validate Terraform
        run: terraform validate

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
