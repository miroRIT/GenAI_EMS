name: deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Deployment environment
        required: true
        options: [staging, prod]
      image_tag:
        description: Container image tag to deploy
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform plan
        run: |
          terraform -chdir=infra/envs/${{ inputs.environment }} init
          terraform -chdir=infra/envs/${{ inputs.environment }} plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="image=${{ secrets.ARTIFACT_REGISTRY }}/${{ inputs.image_tag }}"
      - name: Deploy
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ARTIFACT_REGISTRY: ${{ secrets.ARTIFACT_REGISTRY }}
          DATABASE_URL: placeholder-set-by-secret-manager
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          CONFIRM_PRODUCTION_DEPLOY: ${{ inputs.environment == 'prod' && 'yes' || 'no' }}
        run: ./scripts/deploy.sh ${{ inputs.environment }}
