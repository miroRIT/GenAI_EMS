services:
  api:
    build:
      context: .
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql+asyncpg://emergencypulse:emergencypulse@db:5432/emergencypulse
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-dispatcher}
      ADMIN_PASSWORD_HASH: "${ADMIN_PASSWORD_HASH:-$$2y$$05$$5jgoN0K85u0eA2jorSfF2OcRni/1hGVGKAzZxXykE6TnurhCqiwv6}"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: emergencypulse
      POSTGRES_USER: emergencypulse
      POSTGRES_PASSWORD: emergencypulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emergencypulse -d emergencypulse"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
